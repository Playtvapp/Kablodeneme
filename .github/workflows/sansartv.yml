name: SansarTV M3U Guncelleme

on:
  schedule:
    - cron: '0 */6 * * *' # Her 6 saatte bir otomatik çalışır
  workflow_dispatch: # Actions sekmesinden manuel çalıştırma butonu ekler

permissions:
  contents: write

jobs:
  update-m3u:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Python'u Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Python Scriptini Çalıştır
        run: python main.py

      - name: Değişiklikleri GitHub'a Yükle (Commit & Push)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add sansartv.m3u
          # Eğer dosyada değişiklik yoksa hata vermemesi için || true ekliyoruz
          git commit -m "SansarTV M3U listesi otomatik güncellendi" || true
          git push
